<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Biyani Digital Campus</title>
    <link rel="stylesheet" href="/src/assets/css/main.css">
    <link rel="stylesheet" href="/src/assets/css/login.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🔒</div>
            <h1>Secure Your Account</h1>
            <p>Please change your temporary password to continue.</p>
        </div>

        <form class="login-form" id="changePasswordForm">
            <div class="institutional-notice">
                <strong>⚠️ Security Requirement</strong>
                For your security, you must update your password upon first login.
                Please choose a strong password.
            </div>

            <div class="login-error" id="errorMessage"></div>
            <div class="login-success" id="successMessage"
                style="display:none; color: green; background: #e6fffa; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #b2f5ea;">
                ✅ Password updated successfully! Redirecting...
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="6" placeholder="Minimum 6 characters">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter new password">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Update Password
            </button>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Config -->
    <script src="/src/assets/js/config/firebase.js"></script>

    <!-- Script -->
    <script src="/src/assets/js/auth/reset-password.js"></script>
</body>

</html>
